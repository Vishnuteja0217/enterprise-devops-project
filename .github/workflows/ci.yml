name: Java CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give Execute Permission
        run: chmod +x app/app/mvnw

      - name: Build App
        run: |
          cd app/app
          ./mvnw clean package